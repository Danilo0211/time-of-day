<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time of Day Lab</title>
    
    <style>
        /* We target the HTML element directly for our background color swap */
        html {
            background-color: #f4f4f9; 
            transition: background-color 0.5s ease; /* Makes the color change smooth */
        }

        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            color: #333;
        }

        /* Our main container for the content */
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        /* Styling our main image */
        #time-pic {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="main-greeting">Time of Day Lab</h1>
        
        <h2 id="time-text">What time is it?</h2>

        <p>This page will change based on the hour of the day.</p>

        <img id="time-pic" src="https://via.placeholder.com/400x200?text=Image+Loading..." alt="Time of Day Image">
    </div>

    <script>
        // We will use this section to write our if/else logic
        // Example: document.querySelector('#time-text').innerHTML = "Good Morning!";
        
        /* Below, we would target the 'html' element to change 
           the background color using document.querySelector('html') 
        */

        // The JS to fix the validator links (keeping the original functionality)
        document.addEventListener("DOMContentLoaded", function() {
            var currentUrl = window.location.href;
            document.getElementById("html-validate").href = "https://validator.w3.org/nu/?doc=" + encodeURIComponent(currentUrl);
            document.getElementById("css-validate").href = "https://jigsaw.w3.org/css-validator/validator?uri=" + encodeURIComponent(currentUrl);
        });
    </script>

    <footer style="margin-top: 30px;">
        <small>
            <a id="html-validate" href="">Validate HTML</a> | 
            <a id="css-validate" href="">Validate CSS</a>
        </small>
    </footer>

</body>
</html>
